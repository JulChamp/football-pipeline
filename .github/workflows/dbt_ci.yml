name: dbt CI
on: [push]
jobs:
  dbt-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install dbt-bigquery
      - name: Parse GCP credentials
        run: |
          echo "GCP_SA_TYPE=$(echo '${{ secrets.GCP_SA_KEY }}' | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['type'])")" >> $GITHUB_ENV
          echo "GCP_SA_PROJECT_ID=$(echo '${{ secrets.GCP_SA_KEY }}' | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['project_id'])")" >> $GITHUB_ENV
          echo "GCP_SA_PRIVATE_KEY_ID=$(echo '${{ secrets.GCP_SA_KEY }}' | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['private_key_id'])")" >> $GITHUB_ENV
          echo "GCP_SA_PRIVATE_KEY=$(echo '${{ secrets.GCP_SA_KEY }}' | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['private_key'])")" >> $GITHUB_ENV
          echo "GCP_SA_CLIENT_EMAIL=$(echo '${{ secrets.GCP_SA_KEY }}' | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['client_email'])")" >> $GITHUB_ENV
          echo "GCP_SA_CLIENT_ID=$(echo '${{ secrets.GCP_SA_KEY }}' | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['client_id'])")" >> $GITHUB_ENV
          echo "GCP_SA_AUTH_URI=$(echo '${{ secrets.GCP_SA_KEY }}' | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['auth_uri'])")" >> $GITHUB_ENV
          echo "GCP_SA_TOKEN_URI=$(echo '${{ secrets.GCP_SA_KEY }}' | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['token_uri'])")" >> $GITHUB_ENV
          echo "GCP_SA_AUTH_PROVIDER_CERT_URL=$(echo '${{ secrets.GCP_SA_KEY }}' | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['auth_provider_x509_cert_url'])")" >> $GITHUB_ENV
          echo "GCP_SA_CLIENT_CERT_URL=$(echo '${{ secrets.GCP_SA_KEY }}' | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['client_x509_cert_url'])")" >> $GITHUB_ENV
      - name: Run dbt tests
        run: cd dbt_project/football_dbt && dbt test --profiles-dir .